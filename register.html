<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EFIGHT - Inscription</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
    <div class="container nav-container">
        <a href="index.html" class="logo">EFIGHT</a>

        <button class="menu-toggle" id="menuToggle" aria-label="Ouvrir le menu">
            ☰
        </button>

        <nav class="main-nav" id="mainNav">
            <a href="index.html">Accueil</a>
            <a href="events.html">Events</a>
            <a href="contact.html">Contact</a>
            <a href="about.html">About</a>
        </nav>
    </div>
</header>

<main class="section">
    <div class="container form-page">
        <p class="section-label">INSCRIPTION</p>
        <h1 id="registerPageTitle">Inscription</h1>

        <div class="form-box">
            <h2>Sélectionner un événement</h2>

            <div class="type-switch">
                <div class="type-card" id="spectatorTypeCard">
                    <strong>SPECTATOR</strong>
                    <span>Réserver une place</span>
                </div>
                <div class="type-card" id="participantTypeCard">
                    <strong>PARTICIPANT</strong>
                    <span>Combattre</span>
                </div>
            </div>

            <div class="event-selected-box" id="selectedEventInfo">
                Chargement de l'événement...
            </div>
        </div>

        <div class="form-box">
            <form id="registrationForm" novalidate>
                <div id="formErrors" class="form-errors"></div>
                <div id="dynamicFormFields"></div>
                <button type="submit" class="btn btn-primary">Soumettre l'inscription</button>
            </form>
        </div>

        <div id="ticketContainer" class="ticket-section hidden"></div>
    </div>
</main>

<footer class="site-footer">
    <div class="container footer-grid">
        <div>
            <h3>EFIGHT</h3>
            <p>Plateforme pour événements MMA/UFC.</p>
        </div>

        <div>
            <h4>Liens</h4>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>

        <div>
            <h4>Contact</h4>
            <p>contact@efight.com</p>
        </div>
    </div>
</footer>

<script src="script.js"></script>
</body>
</html>
